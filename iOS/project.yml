name: BatteryDrawer
options:
  bundleIdPrefix: com.shimondeitel.batterydrawer
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BatteryDrawer:
    type: application
    platform: iOS
    sources:
      - path: BatteryDrawer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batterydrawer
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BatteryDrawer/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatteryDrawerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatteryDrawerTests
      - path: BatteryDrawer.storekit
    dependencies:
      - target: BatteryDrawer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batterydrawer.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatteryDrawerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatteryDrawerUITests
    dependencies:
      - target: BatteryDrawer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batterydrawer.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BatteryDrawer:
    build:
      targets:
        BatteryDrawer: all
        BatteryDrawerTests: [test]
        BatteryDrawerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BatteryDrawer.storekit
    test:
      config: Debug
      storeKitConfiguration: BatteryDrawer.storekit
      targets:
        - BatteryDrawerTests
        - BatteryDrawerUITests
    archive:
      config: Release
